services:
  backend:
    build: ./karaoke-back
    ports:
      - "8000:8000"
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
    volumes:
      - ./cookies.txt:/app/cookies.txt
    restart: unless-stopped

  frontend:
    build:
      context: ./karaoke-front
      args:
        - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
