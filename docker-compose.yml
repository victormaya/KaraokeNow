services:
  backend:
    build: ./karaoke-back
    ports:
      - "8000:8000"
    environment:
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - YTDLP_PROXY=${YTDLP_PROXY:-}
      - BGUTIL_URL=http://bgutil-provider:4416
    depends_on:
      - bgutil-provider
    volumes:
      - ./cookies.txt:/app/cookies.txt
      - karaoke_cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./karaoke-front
      args:
        - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    ports:
      - "4416:4416"
    environment:
      - HTTP_PROXY=${YTDLP_PROXY:-}
      - HTTPS_PROXY=${YTDLP_PROXY:-}
    restart: unless-stopped

  cookie-refresher:
    build:
      context: ./karaoke-back
      dockerfile: Dockerfile.cookies
    volumes:
      - ./cookies.txt:/app/cookies.txt
    environment:
      - COOKIES_FILE=/app/cookies.txt
      - COOKIE_REFRESH_INTERVAL=${COOKIE_REFRESH_INTERVAL:-172800}
      - GOOGLE_EMAIL=${GOOGLE_EMAIL:-}
      - GOOGLE_PASSWORD=${GOOGLE_PASSWORD:-}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  karaoke_cache:
